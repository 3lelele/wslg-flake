name: Build System Distro

on:
  workflow_dispatch:
    inputs:
      wsland_ref:
        description: wsland git ref to build
        required: false
        default: master
  push:
    branches:
      - main

jobs:
  build-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      WSLAND_REPO: https://github.com/3lelele/wsland.git
      WSLAND_REF: ${{ github.event.inputs.wsland_ref || 'master' }}

    steps:
      - name: Checkout wslg-flake
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Prepare vendor sources
        run: |
          set -euxo pipefail
          rm -rf vendor
          mkdir -p vendor

          git clone --depth 1 --branch working https://github.com/microsoft/FreeRDP-mirror vendor/FreeRDP
          git clone --depth 1 --branch working https://github.com/microsoft/weston-mirror.git vendor/weston
          git clone --branch working https://github.com/microsoft/pulseaudio-mirror.git vendor/pulseaudio
          git -C vendor/pulseaudio fetch --tags --force
          git clone --depth 1 --branch "${WSLAND_REF}" "${WSLAND_REPO}" vendor/wsland

          wget -nv https://azurelinuxsrcstorage.blob.core.windows.net/sources/core/mesa-23.1.0.tar.xz
          tar -xf mesa-23.1.0.tar.xz -C vendor
          mv vendor/mesa-23.1.0 vendor/mesa

          wget -nv https://github.com/microsoft/DirectX-Headers/archive/refs/tags/v1.608.0.tar.gz
          tar -xf v1.608.0.tar.gz -C vendor
          mv vendor/DirectX-Headers-1.608.0 vendor/DirectX-Headers-1.0

      - name: Build system distro image
        run: |
          set -euxo pipefail
          docker build -f Dockerfile -t system-distro-x64 . \
            --build-arg WSLG_VERSION="${GITHUB_SHA}" \
            --build-arg WSLG_ARCH=x86_64

      - name: Export rootfs tar
        run: |
          set -euxo pipefail
          cid="$(docker create system-distro-x64)"
          trap 'docker rm -f "${cid}"' EXIT
          docker export "${cid}" > system_x64.tar

      - name: Convert tar to VHD
        run: |
          set -euxo pipefail
          go run github.com/Microsoft/hcsshim/cmd/tar2ext4@latest -vhd -i system_x64.tar -o system_x64.vhd

      - name: Upload VHD artifact
        uses: actions/upload-artifact@v4
        with:
          name: system_x64.vhd
          path: system_x64.vhd
          if-no-files-found: error

      - name: Upload tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: system_x64.tar
          path: system_x64.tar
          if-no-files-found: error
