name: Build System Distro

on:
  workflow_dispatch:
    inputs:
      wsland_ref:
        description: 'wsland git ref to build (branch, tag, or commit)'
        required: false
        default: 'master'
      debug_build:
        description: 'Enable debug build'
        type: boolean
        required: false
        default: false

jobs:
  build-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      WSLAND_REPO: https://github.com/3lelele/wsland.git
      WSLAND_REF: ${{ github.event.inputs.wsland_ref || 'master' }}

    steps:
      - name: Checkout wslg-flake
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Prepare vendor sources
        run: |
          set -euxo pipefail
          rm -rf vendor
          mkdir -p vendor

          # Mesa
          git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git vendor/mesa

          # FreeRDP - qq1038765585's fork with GFXREDIR and RDPAPPLIST channel support
          git clone --branch working https://github.com/qq1038765585/freerdp-flake.git vendor/freerdp

          # PulseAudio - microsoft mirror
          git clone --branch working https://github.com/microsoft/pulseaudio-mirror.git vendor/pulseaudio
          git -C vendor/pulseaudio fetch --tags --force

          # wsland - our repo (synced with qq upstream)
          git clone --depth 1 --branch "${WSLAND_REF}" "${WSLAND_REPO}" vendor/wsland

      - name: Build system distro image
        run: |
          set -euxo pipefail
          docker build -f DockerfileArch -t system-distro-x64 . \
            --build-arg WSLG_VERSION="${GITHUB_SHA}" \
            --build-arg WSLG_ARCH=x86_64 \
            --build-arg SYSTEMDISTRO_DEBUG_BUILD=${{ github.event.inputs.debug_build && '1' || '' }}

      - name: Export rootfs tar
        run: |
          set -euxo pipefail
          cid="$(docker create system-distro-x64)"
          trap 'docker rm -f "${cid}"' EXIT
          docker export "${cid}" > system_x64.tar

      - name: Convert tar to VHD
        run: |
          set -euxo pipefail
          go run github.com/Microsoft/hcsshim/cmd/tar2ext4@latest -vhd -i system_x64.tar -o system_x64.vhd

      - name: Upload VHD artifact
        uses: actions/upload-artifact@v4
        with:
          name: system_x64.vhd
          path: system_x64.vhd
          if-no-files-found: error

      - name: Upload tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: system_x64.tar
          path: system_x64.tar
          if-no-files-found: error
